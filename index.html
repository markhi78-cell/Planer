<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baustellen-Planer Cloud Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // --- HIER DEINE FIREBASE-DATEN EINFÜGEN ---
                  const firebaseConfig = {
			apiKey: "AIzaSyCQ0-BjZLe8_zD30-n3_KtvmRdc6uSJZRI",
			authDomain: "planergit.firebaseapp.com",
			projectId: "planergit",
			storageBucket: "planergit.firebasestorage.app",
			messagingSenderId: "963024547236",
			appId: "1:963024547236:web:bed49732f28e663d78e531",
			measurementId: "G-SRPMV6FVP2"
        };
        // ------------------------------------------

        // App Initialisieren
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, 'baustellen_daten');

        // Globaler State
        window.state = { projects: [], companies: [] };
        window.activeProjectId = null;

        // 1. DATEN AUS CLOUD LADEN (Echtzeit-Sync)
        onValue(dbRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                window.state = data;
                renderSidebar();
                if (window.activeProjectId) {
                    renderTasks();
                } else if (!document.getElementById('view-companies').classList.contains('hidden')) {
                    renderCompanies();
                }
            }
            document.getElementById('sync-status').innerHTML = '<span class="flex items-center gap-1 text-green-600"><i data-lucide="cloud-check" class="w-3 h-3"></i> Synchronisiert</span>';
            lucide.createIcons();
        });

        // 2. DATEN IN CLOUD SPEICHERN
        window.saveToCloud = function() {
            document.getElementById('sync-status').innerHTML = '<span class="flex items-center gap-1 text-orange-400 animate-pulse"><i data-lucide="refresh-cw" class="w-3 h-3"></i> Speichert...</span>';
            lucide.createIcons();
            set(dbRef, window.state);
        };

        // NAVIGATION & UI FUNKTIONEN (Global zugänglich machen)
        window.showProject = (id) => {
            window.activeProjectId = id;
            hideAll();
            document.getElementById('view-project').classList.remove('hidden');
            const project = window.state.projects.find(p => p.id === id);
            document.getElementById('nav-current').innerText = project.name;
            document.getElementById('mainTitle').innerText = project.name;
            renderTasks();
            renderSidebar();
        };

        window.showCompanies = () => {
            window.activeProjectId = null;
            hideAll();
            document.getElementById('view-companies').classList.remove('hidden');
            document.getElementById('nav-current').innerText = "Firmen-Stammdaten";
            renderCompanies();
            renderSidebar();
        };

        function hideAll() {
            ['view-project', 'view-companies', 'emptyState'].forEach(id => document.getElementById(id).classList.add('hidden'));
        }

        // --- HIER DIE GEWOHNTEN FUNKTIONEN (Angepasst auf saveToCloud) ---
        window.addNewProject = () => {
            const newProj = { id: Date.now(), name: 'Neues Projekt', tasks: [] };
            window.state.projects.push(newProj);
            window.saveToCloud();
            window.showProject(newProj.id);
        };

        window.addTask = () => {
            const p = window.state.projects.find(p => p.id === window.activeProjectId);
            p.tasks.push({ id: Date.now(), task: '', date: '', companyId: '', contactId: '', status: 'Offen' });
            window.saveToCloud();
        };

        window.updateTask = (taskId, field, val) => {
            const p = window.state.projects.find(p => p.id === window.activeProjectId);
            const t = p.tasks.find(t => t.id === taskId);
            t[field] = val;
            if(field === 'companyId') t.contactId = '';
            window.saveToCloud();
        };

        window.addCompany = () => {
            window.state.companies.push({ id: Date.now(), name: 'Neue Firma', contacts: [] });
            window.saveToCloud();
        };

        window.addContact = (compId) => {
            window.state.companies.find(c => c.id === compId).contacts.push({ id: Date.now(), name: '', phone: '', email: '' });
            window.saveToCloud();
        };

        window.updateCompany = (id, val) => {
            window.state.companies.find(c => c.id === id).name = val;
            window.saveToCloud();
        };

        window.updateContact = (compId, conId, field, val) => {
            window.state.companies.find(c => c.id === compId).contacts.find(con => con.id === conId)[field] = val;
            window.saveToCloud();
        };
        
        window.updateProjectName = (el) => {
            window.state.projects.find(p => p.id === window.activeProjectId).name = el.innerText;
            window.saveToCloud();
        };

        // RENDER LOGIK
        window.renderSidebar = () => {
            const list = document.getElementById('projectList');
            list.innerHTML = '';
            window.state.projects.forEach(p => {
                const li = document.createElement('li');
                li.className = `px-2 py-2 rounded cursor-pointer truncate text-sm ${window.activeProjectId === p.id ? 'bg-gray-200 font-semibold' : 'hover:bg-gray-100 text-gray-600'}`;
                li.onclick = () => window.showProject(p.id);
                li.innerHTML = `<div class="flex items-center gap-2"><i data-lucide="file-text" class="w-4 h-4"></i> ${p.name}</div>`;
                list.appendChild(li);
            });
            lucide.createIcons();
        };

        window.renderTasks = () => {
            const p = window.state.projects.find(p => p.id === window.activeProjectId);
            const tbody = document.getElementById('taskTableBody');
            tbody.innerHTML = '';
            p.tasks.forEach(t => {
                const comp = window.state.companies.find(c => c.id == t.companyId);
                const con = comp?.contacts.find(con => con.id == t.contactId);
                const tr = document.createElement('tr');
                tr.className = "border-b border-gray-50";
                tr.innerHTML = `
                    <td class="py-4 px-2"><div class="editable text-sm font-medium" contenteditable="true" onblur="window.updateTask(${t.id}, 'task', this.innerText)">${t.task}</div></td>
                    <td class="py-4 px-2">
                        <select onchange="window.updateTask(${t.id}, 'companyId', this.value)" class="text-xs font-semibold bg-transparent">
                            <option value="">-- Firma --</option>
                            ${window.state.companies.map(c => `<option value="${c.id}" ${t.companyId == c.id ? 'selected' : ''}>${c.name}</option>`).join('')}
                        </select>
                        <select onchange="window.updateTask(${t.id}, 'contactId', this.value)" class="text-xs block text-gray-500 mt-1 bg-transparent">
                            <option value="">-- Kontakt --</option>
                            ${comp ? comp.contacts.map(c => `<option value="${c.id}" ${t.contactId == c.id ? 'selected' : ''}>${c.name}</option>`).join('') : ''}
                        </select>
                    </td>
                    <td class="py-4 px-2">
                        <select onchange="window.updateTask(${t.id}, 'status', this.value)" class="text-[10px] font-bold uppercase rounded px-2 py-1 ${t.status === 'Erledigt' ? 'bg-green-100 text-green-700' : 'bg-gray-100'}">
                            <option ${t.status === 'Offen' ? 'selected' : ''}>Offen</option>
                            <option ${t.status === 'In Arbeit' ? 'selected' : ''}>In Arbeit</option>
                            <option ${t.status === 'Erledigt' ? 'selected' : ''}>Erledigt</option>
                        </select>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            lucide.createIcons();
        };

        window.renderCompanies = () => {
            const container = document.getElementById('companyList');
            container.innerHTML = '';
            window.state.companies.forEach(c => {
                const div = document.createElement('div');
                div.className = "p-4 border border-gray-100 rounded-xl bg-white shadow-sm";
                div.innerHTML = `
                    <input class="font-bold mb-3 w-full" value="${c.name}" onblur="window.updateCompany(${c.id}, this.value)">
                    <div class="space-y-2">
                        ${c.contacts.map(con => `
                            <div class="bg-gray-50 p-2 rounded text-xs">
                                <input class="w-full font-bold mb-1 bg-transparent" value="${con.name}" onblur="window.updateContact(${c.id}, ${con.id}, 'name', this.value)" placeholder="Name">
                                <input class="w-full text-blue-600 bg-transparent" value="${con.phone}" onblur="window.updateContact(${c.id}, ${con.id}, 'phone', this.value)" placeholder="Tel">
                            </div>
                        `).join('')}
                    </div>
                    <button onclick="window.addContact(${c.id})" class="text-[10px] text-blue-600 mt-2">+ Kontakt</button>
                `;
                container.appendChild(div);
            });
            lucide.createIcons();
        };

        lucide.createIcons();
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fbfbfa; color: #37352f; }
        .editable:focus { outline: none; background: #f1f1f0; border-radius: 2px; }
    </style>
</head>
<body class="flex h-screen w-full overflow-hidden">

    <aside class="w-[260px] bg-[#f7f7f5] border-r border-[#edece9] flex flex-col shrink-0">
        <div class="p-4 font-semibold flex items-center gap-2 text-blue-800">
            <i data-lucide="cloud" class="w-5 h-5"></i>
            <span>Baustellen Cloud</span>
        </div>
        <nav class="flex-1 overflow-y-auto px-2 space-y-4 mt-4">
            <div>
                <div class="text-[10px] font-bold text-gray-400 uppercase px-2 mb-2">Projekte</div>
                <ul id="projectList" class="space-y-1"></ul>
                <button onclick="window.addNewProject()" class="w-full text-left px-2 py-1 text-gray-500 hover:bg-gray-200 rounded text-sm mt-2">+ Projekt</button>
            </div>
            <div>
                <div class="text-[10px] font-bold text-gray-400 uppercase px-2 mb-2">Stammdaten</div>
                <button onclick="window.showCompanies()" class="w-full text-left px-2 py-1 text-gray-600 hover:bg-gray-200 rounded text-sm">Firmen & Kontakte</button>
            </div>
        </nav>
        <div id="sync-status" class="p-4 text-[10px] border-t border-gray-200">Warte auf Verbindung...</div>
    </aside>

    <main class="flex-1 flex flex-col bg-white">
        <header class="h-10 border-b border-gray-50 flex items-center px-4 justify-between">
            <div id="nav-current" class="text-xs text-gray-400 italic">Wähle ein Projekt</div>
        </header>

        <div class="flex-1 overflow-y-auto p-10">
            <div id="view-project" class="hidden max-w-4xl mx-auto">
                <h1 id="mainTitle" class="text-4xl font-bold mb-8 outline-none" contenteditable="true" onblur="window.updateProjectName(this)">Projekt</h1>
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-[10px] text-gray-400 uppercase border-b border-gray-100">
                            <th class="py-2">Aufgabe</th>
                            <th class="py-2">Zuständig</th>
                            <th class="py-2">Status</th>
                        </tr>
                    </thead>
                    <tbody id="taskTableBody"></tbody>
                </table>
                <button onclick="window.addTask()" class="mt-8 text-sm text-gray-400 hover:text-black">+ Neue Aufgabe</button>
            </div>

            <div id="view-companies" class="hidden max-w-4xl mx-auto">
                <h1 class="text-4xl font-bold mb-8">Firmen</h1>
                <div id="companyList" class="grid grid-cols-2 gap-4"></div>
                <button onclick="window.addCompany()" class="mt-8 border px-4 py-2 rounded text-sm">+ Neue Firma</button>
            </div>

            <div id="emptyState" class="h-full flex items-center justify-center text-gray-200">
                <i data-lucide="cloud-rain" class="w-20 h-20"></i>
            </div>
        </div>
    </main>

</body>
</html>
